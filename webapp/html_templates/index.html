<!doctype html>
<html>
  <body>
    <h1>Patent Support Search</h1>

    <form method="post" action="/run">
      <div>
        <label>Patent number:</label>
        <input name="patent_number_to_search" />
      </div>
      <div>
        <label>Application number:</label>
        <input name="app_number_to_search" />
      </div>

      <div style="margin-top: 12px;">
        <label>Query:</label>
        <input name="query" required style="width: 520px;" />
      </div>

      <div style="margin-top: 12px;">
        <button type="submit">Run</button>
      </div>
    </form>

    <p style="margin-top:16px; color:#666;">
      Provide either patent number or application number.
    </p>
  </body>
</html>
