<!doctype html>
<html>
  <body>
    <a href="/">← New search</a>
    <h2>Query: {{ query }}</h2>
    <div><b>Application:</b> {{ app_no }}</div>
    {% if patent_no %}<div><b>Patent:</b> {{ patent_no }}</div>{% endif %}

    <h3>Support</h3>
    <div>{{ support_html | safe }}</div>

    <h3>Raw hits</h3>
    <pre>{{ hits | tojson(indent=2) }}</pre>

    <br /><br />
    <h3>Timing</h3>
    <ul>
      {% for k, v in timings.items() %}
        <li><b>{{ k }}</b>: {{ "%.2f"|format(v) }} s</li>
      {% endfor %}
    </ul>
  </body>
</html>
